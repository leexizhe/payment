name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ledger-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # Runs unit tests (Surefire) then integration tests (Failsafe) against a
      # Testcontainers Postgres — Docker is available on GitHub-hosted runners.
      - name: Build and verify
        run: ./mvnw --batch-mode verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            ledger-service/target/surefire-reports/
            ledger-service/target/failsafe-reports/
