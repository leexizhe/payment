services:
  # The ledger's system of record. Schema + seed data are applied by
  # Liquibase when the app starts, not by this container.
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment:
      - POSTGRES_DB=ledger
      - POSTGRES_USER=ledger
      - POSTGRES_PASSWORD=ledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Scrapes /actuator/prometheus from the ledger-service (running on your host)
  prometheus:
    image: prom/prometheus:latest
    container_name: ledger-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      # Lets the container reach an app running on your host (needed on Linux)
      - "host.docker.internal:host-gateway"

  # Trace backend. Receives OTLP from the collector, queried by Grafana.
  tempo:
    image: grafana/tempo:latest
    container_name: ledger-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # Tempo query API (Grafana talks to this)

  # The OpenTelemetry backbone: app -> collector -> tempo.
  # In prod this is where you'd batch, filter, add resource attrs, fan out.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ledger-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (from your app)
      - "4318:4318"   # OTLP HTTP (from your app)
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:latest
    container_name: ledger-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo

volumes:
  pgdata:
